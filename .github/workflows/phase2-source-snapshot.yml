name: Phase 2 Source Snapshot

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Collect Phase 2 source
        run: |
          mkdir -p phase2-source/tests
          cp accounting.js hr.js supabase-data.js biners.js index.html package.json phase2-source/
          cp -r tests phase2-source/
      - name: Upload Phase 2 source
        uses: actions/upload-artifact@v4
        with:
          name: phase2-source
          path: phase2-source
          retention-days: 1
