name: ERP Safety Checks

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: erp-safety-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  safety-checks:
    name: Regression, syntax, and migration checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install locked dependencies
        run: npm ci --ignore-scripts

      - name: Run ERP safety checks
        run: npm run ci

      - name: Report production dependency vulnerabilities
        continue-on-error: true
        run: npm audit --omit=dev --audit-level=high
