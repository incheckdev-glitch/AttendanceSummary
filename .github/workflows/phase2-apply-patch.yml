name: Phase 2 Apply Validated Patch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Detect already applied patch
        id: detect
        shell: bash
        run: |
          if [[ -f tests/phase2-data-integrity.test.js ]]; then
            echo "applied=true" >> "$GITHUB_OUTPUT"
          else
            echo "applied=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Decode validated patch
        if: steps.detect.outputs.applied != 'true'
        shell: bash
        run: |
          sed -n '30p' .github/workflows/phase2-source-snapshot.yml > /tmp/phase2.patch.gz.b64
          base64 -d /tmp/phase2.patch.gz.b64 | gzip -d > /tmp/phase2.patch
          test -s /tmp/phase2.patch
      - name: Validate patch against branch
        if: steps.detect.outputs.applied != 'true'
        run: git apply --check /tmp/phase2.patch
      - name: Apply patch
        if: steps.detect.outputs.applied != 'true'
        run: git apply /tmp/phase2.patch
      - name: Validate changed files
        if: steps.detect.outputs.applied != 'true'
        run: |
          node --check accounting.js
          node --check hr.js
          node --check supabase-data.js
          node tests/biners-entry-save.test.js
          node tests/phase2-data-integrity.test.js
      - name: Commit validated patch
        if: steps.detect.outputs.applied != 'true'
        run: |
          git config user.name "InCheck360 Safety Automation"
          git config user.email "actions@users.noreply.github.com"
          git add accounting.js hr.js supabase-data.js tests/phase2-data-integrity.test.js
          git commit -m "Enforce database-confirmed Accounting and HR writes"
      - name: Push validated patch
        if: steps.detect.outputs.applied != 'true'
        run: git push origin HEAD:${{ github.event.pull_request.head.ref }}
