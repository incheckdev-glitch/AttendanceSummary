name: Phase 3 Source Snapshot

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Collect Phase 3 source
        run: |
          mkdir -p phase3-source/tests
          cp session.js permissions.js ui.js app.js package.json phase3-source/
          cp -r tests phase3-source/
      - name: Upload Phase 3 source
        uses: actions/upload-artifact@v4
        with:
          name: phase3-source
          path: phase3-source
          retention-days: 1
