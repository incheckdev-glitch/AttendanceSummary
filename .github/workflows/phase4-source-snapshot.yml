name: Phase 4 Source Snapshot

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Collect Phase 4 source
        run: |
          mkdir -p phase4-source
          rsync -a \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'phase4-source' \
            ./ phase4-source/
      - name: Upload Phase 4 source
        uses: actions/upload-artifact@v4
        with:
          name: phase4-source
          path: phase4-source
          retention-days: 1
