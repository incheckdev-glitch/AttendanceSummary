name: Phase 3 RLS Snapshot

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Collect auth and permission SQL
        run: |
          mkdir -p phase3-rls
          find . -type f -name '*.sql' \
            -not -path './node_modules/*' \
            -not -path './.git/*' | while read -r file; do
            clean="${file#./}"
            if grep -Eqi 'get_my_role_permissions|role_permissions|profiles|is_active|auth\.uid|row level security|create policy' "$file"; then
              mkdir -p "phase3-rls/$(dirname "$clean")"
              cp "$file" "phase3-rls/$clean"
            fi
          done
      - name: Upload policy snapshot
        uses: actions/upload-artifact@v4
        with:
          name: phase3-rls
          path: phase3-rls
          retention-days: 1
